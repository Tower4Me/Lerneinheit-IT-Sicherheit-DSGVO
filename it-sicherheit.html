/* ============ STATE / RENDER ============ */
let visited = {};
try{ visited = JSON.parse(localStorage.getItem('sec_visited')||'{}'); }catch(e){ visited={}; }
let curSec = MODULES[0].sections[0].id;
let totalSecs = MODULES.reduce((a,m)=>a+m.sections.length,0);

function saveVisited(){ try{localStorage.setItem('sec_visited',JSON.stringify(visited));}catch(e){} }
function flat(){ const r=[]; MODULES.forEach(m=>m.sections.forEach(s=>r.push({m,s}))); return r; }

function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  MODULES.forEach((m,mi)=>{
    const allDone=m.sections.every(s=>visited[s.id]);
    const wrap=document.createElement('div'); wrap.className='nav-mod'+(mi===0?' open':'');
    wrap.innerHTML=`<div class="nav-mod-head"><span><span class="num">${m.num}</span>${m.title}</span><span class="done">${allDone?'✓':''}</span></div><div class="nav-sub"></div>`;
    const sub=wrap.querySelector('.nav-sub');
    m.sections.forEach(s=>{
      const a=document.createElement('a'); a.textContent=s.label; a.dataset.id=s.id;
      if(s.id===curSec) a.className='active';
      a.onclick=()=>{goto(s.id);if(window.innerWidth<=920)toggleNav();};
      sub.appendChild(a);
    });
    wrap.querySelector('.nav-mod-head').onclick=()=>wrap.classList.toggle('open');
    nav.appendChild(wrap);
  });
}

function updateProgress(){
  const done=Object.keys(visited).filter(k=>visited[k]).length;
  const pct=Math.round(done/totalSecs*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}

function render(){
  const content=document.getElementById('content'); content.innerHTML='';
  flat().forEach(({m,s})=>{
    const div=document.createElement('div'); div.className='section'+(s.id===curSec?' active':''); div.id='sec-'+s.id;
    div.innerHTML=s.html;
    // pager
    const all=flat(); const idx=all.findIndex(x=>x.s.id===s.id);
    const prev=all[idx-1], next=all[idx+1];
    const pager=document.createElement('div'); pager.className='pager';
    pager.innerHTML=`
      <button ${prev?'':'disabled'} onclick="${prev?`goto('${prev.s.id}')`:''}"><span class="lbl">Zurück</span>${prev?prev.s.label:'—'}</button>
      <button class="nxt" ${next?'':'disabled'} onclick="${next?`goto('${next.s.id}')`:''}"><span class="lbl">Weiter</span>${next?next.s.label:'Fertig'}</button>`;
    div.appendChild(pager);
    content.appendChild(div);
  });
  mountInteractive();
}

function goto(id){
  curSec=id; visited[id]=true; saveVisited();
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('sec-'+id); if(el)el.classList.add('active');
  document.querySelectorAll('.nav-sub a').forEach(a=>a.classList.toggle('active',a.dataset.id===id));
  const found=flat().find(x=>x.s.id===id);
  document.getElementById('crumb').textContent=`Modul ${found.m.num} · ${found.s.label}`;
  // open the right module group
  document.querySelectorAll('.nav-mod').forEach((w,i)=>{ if(MODULES[i].sections.some(s=>s.id===id)) w.classList.add('open'); });
  buildNav(); updateProgress();
  document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});
  window.scrollTo({top:0,behavior:'smooth'});
  mountInteractive();
}

function resetProgress(){ visited={}; saveVisited(); buildNav(); updateProgress(); }

/* Symmetric cipher demo (Caesar) */
function caesar(str,k){return str.replace(/[a-zA-ZäöüÄÖÜ]/g,ch=>{
  const c=ch.charCodeAt(0);
  if(c>=65&&c<=90)return String.fromCharCode((c-65+k+26)%26+65);
  if(c>=97&&c<=122)return String.fromCharCode((c-97+k+26)%26+97);
  return ch;});}
function symEnc(){const t=document.getElementById('symPlain').value;const k=+document.getElementById('symKey').value||0;
  document.getElementById('symOut').textContent='Verschlüsselt (Schlüssel '+k+'):\n'+caesar(t,k);}
function symDec(){const t=document.getElementById('symOut').textContent.split('\n').pop();const k=+document.getElementById('symKey').value||0;
  document.getElementById('symOut').textContent='Entschlüsselt (Schlüssel '+k+'):\n'+caesar(t,-k);}

/* Hash demo (real SHA via SubtleCrypto) */
async function doHash(){
  const inEl=document.getElementById('hashIn'),outEl=document.getElementById('hashOut'),alg=document.getElementById('hashAlg').value;
  if(!inEl||!outEl)return;
  try{
    const data=new TextEncoder().encode(inEl.value);
    const buf=await crypto.subtle.digest(alg,data);
    const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    outEl.textContent=alg+' ('+(hex.length*4)+' Bit):\n'+hex;
  }catch(e){ outEl.textContent='Hashing in diesem Kontext nicht verfügbar.'; }
}

/* RAID calc */
function calcRaid(){
  const n=+document.getElementById('raidN').value,c=+document.getElementById('raidC').value,l=document.getElementById('raidLvl').value;
  const out=document.getElementById('raidOut'); let usable=0,tol='',need=2,note='';
  if(l==='0'){usable=n*c;tol='keine';need=2;}
  else if(l==='1'){usable=n>=2?c:0;tol='n−1 Platten (mind. eine bleibt)';need=2;note=' (klassisch 2 Platten gespiegelt)';}
  else if(l==='5'){if(n<3){out.textContent='RAID 5 braucht mindestens 3 Platten.';return;}usable=(n-1)*c;tol='1 Platte';need=3;}
  else if(l==='6'){if(n<4){out.textContent='RAID 6 braucht mindestens 4 Platten.';return;}usable=(n-2)*c;tol='2 Platten';need=4;}
  else if(l==='10'){if(n<4||n%2!==0){out.textContent='RAID 10 braucht eine gerade Anzahl (mind. 4).';return;}usable=(n/2)*c;tol='1 je Spiegelpaar';need=4;}
  out.textContent=
`RAID ${l}${note}
Platten: ${n} × ${c} TB = ${n*c} TB brutto
Nutzkapazität: ${usable} TB
Ausfalltoleranz: ${tol}
Effizienz: ${Math.round(usable/(n*c)*100)} %`;
}

/* Quiz renderer */
function renderQuiz(host,id,qs){
  const wrap=document.createElement('div'); wrap.className='quiz'; let score=0,answered=0;
  wrap.innerHTML=`<div id="qbody-${id}"></div>
    <div class="quiz-foot"><span class="quiz-score">Punkte: <b id="qsc-${id}">0</b> / ${qs.length}</span>
    <button class="btn ghost" onclick="redoQuiz('${id}')">Quiz wiederholen</button></div>`;
  // insert before pager
  const pager=host.querySelector('.pager'); host.insertBefore(wrap,pager);
  const body=wrap.querySelector('#qbody-'+id);
  qs.forEach((item,qi)=>{
    const qd=document.createElement('div'); qd.style.marginBottom='26px';
    qd.innerHTML=`<div class="quiz-q">Frage ${qi+1} von ${qs.length}</div><div class="quiz-question">${item.q}</div>`;
    item.o.forEach((opt,oi)=>{
      const b=document.createElement('button'); b.className='quiz-opt';
      b.innerHTML=`<span class="ltr">${String.fromCharCode(65+oi)}</span>${opt}`;
      b.onclick=()=>{
        if(qd.dataset.done)return; qd.dataset.done=1; answered++;
        const btns=qd.querySelectorAll('.quiz-opt'); btns.forEach(x=>x.disabled=true);
        if(oi===item.a){b.classList.add('correct');score++;}
        else{b.classList.add('wrong');btns[item.a].classList.add('correct');}
        document.getElementById('qsc-'+id).textContent=score;
        qd.querySelector('.quiz-explain').classList.add('show');
      };
      qd.appendChild(b);
    });
    const ex=document.createElement('div'); ex.className='quiz-explain'; ex.textContent=item.e; qd.appendChild(ex);
    body.appendChild(qd);
  });
}
function redoQuiz(id){
  const host=document.getElementById('sec-'+id); const q=host.querySelector('.quiz'); if(q)q.remove();
  renderQuiz(host,id,QUIZZES[id]);
}

  let score=0;
  const sc=document.createElement('div'); sc.className='quiz';
  sc.innerHTML=`<div id="finBody"></div>
    <div class="quiz-foot"><span class="quiz-score">Punkte: <b id="finSc">0</b> / ${FINAL.length}</span>
    <button class="btn ghost" onclick="redoFinal()">Quiz wiederholen</button></div>`;
  host.appendChild(sc);
  const body=sc.querySelector('#finBody');
  FINAL.forEach((item,qi)=>{
    const qd=document.createElement('div'); qd.style.marginBottom='26px';
    qd.innerHTML=`<div class="quiz-q">Frage ${qi+1} von ${FINAL.length}</div><div class="quiz-question">${item.q}</div>`;
    item.o.forEach((opt,oi)=>{
      const b=document.createElement('button'); b.className='quiz-opt';
      b.innerHTML=`<span class="ltr">${String.fromCharCode(65+oi)}</span>${opt}`;
      b.onclick=()=>{
        if(qd.dataset.done)return; qd.dataset.done=1;
        qd.querySelectorAll('.quiz-opt').forEach(x=>x.disabled=true);
        if(oi===item.a){b.classList.add('correct');score++;}
        else{b.classList.add('wrong');qd.querySelectorAll('.quiz-opt')[item.a].classList.add('correct');}
        document.getElementById('finSc').textContent=score;
        qd.querySelector('.quiz-explain').classList.add('show');
      };
      qd.appendChild(b);
    });
    const ex=document.createElement('div'); ex.className='quiz-explain'; ex.textContent=item.e; qd.appendChild(ex);
    body.appendChild(qd);
  });
}
function redoFinal(){const h=document.getElementById('finalQuiz');h.dataset.built='';h.innerHTML='';buildFinal();}

/* Scenario */

};
let scnState='start';
function buildScenario(){ scnState='start'; renderScn(); }
function renderScn(){
  const host=document.getElementById('scenario'); if(!host)return;
  const node=SCN[scnState]; let html=`<p style="margin-bottom:14px">${node.txt}</p>`;
  if(node.opts){ node.opts.forEach((o,i)=>{ html+=`<button class="quiz-opt" onclick="scnGo('${o[1]}')"><span class="ltr">${String.fromCharCode(65+i)}</span>${o[0]}</button>`; }); }
  if(node.back){ html+=`<button class="btn ghost" onclick="scnGo('${scnPrev}')">← Zurück und neu versuchen</button>`; }
  if(node.done){ html+=`<button class="btn" onclick="scnGo('start')">Szenario neu starten</button>`; }
  host.innerHTML=html;
}
let scnPrev='start';
function scnGo(s){ const prevNode=SCN[scnState]; if(prevNode.opts) scnPrev=scnState; scnState=s; renderScn(); }

buildNav(); render(); goto(curSec); updateProgress();
